appId: so.argo.chewo
productName: Chewo
directories:
  buildResources: build
  output: dist
files:
  - out/**
# STT sidecar: `predist` builds it, this drops the executable at
# Resources/bin/chewo-stt-whisper — where sidecarPath() looks when packaged.
extraResources:
  - from: packages/stt-whisper/.build/release/chewo-stt-whisper
    to: bin/chewo-stt-whisper
asarUnpack:
  - node_modules/node-pty/**
npmRebuild: false
mac:
  target:
    - dir
  # TCC usage strings — mic for dictation, system audio for the notes
  # device+mic (meeting/online lesson) capture. TCC may attribute the
  # sidecar's capture to the parent app, so the app must carry them too.
  extendInfo:
    NSMicrophoneUsageDescription: Chewo transcribes your dictation and recordings locally with Whisper.
    NSAudioCaptureUsageDescription: Chewo captures computer audio to transcribe online lessons and meetings into your notes.
  # Local dogfood builds: skip keychain identity (duplicated cert makes it
  # ambiguous); ad-hoc signature is enough for an app built on this machine.
  identity: null
