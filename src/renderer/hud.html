<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Chewo Voice</title>
    <style>
      /* Fixed graphite+emerald (design/06) — the HUD floats over other apps,
         so it keeps the stock look regardless of in-app appearance settings */
      :root {
        --hud-bg: rgba(24, 24, 24, 0.94);
        --hud-line: #3a3a3a;
        --hud-text: #e9e7e4;
        --hud-text-2: #adaaa6;
        --hud-text-3: #807d78;
        --hud-accent: hsl(158 52% 48%);
        --hud-danger: #e2574b;
        --hud-live: #34c9d6;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
        user-select: none;
      }
      .hud {
        margin: 8px;
        border-radius: 14px;
        background: var(--hud-bg);
        border: 1px solid var(--hud-line);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 16px 40px rgba(0, 0, 0, 0.45);
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        /* Content defines the height — the window resizes to fit (hud:resize);
           only past the window cap does the transcript scroll */
        height: auto;
        max-height: calc(100vh - 16px);
      }
      .hud-header {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .hud-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--hud-danger);
        flex: none;
      }
      .hud--thinking .hud-dot {
        background: var(--hud-live);
        animation: hud-breath 1.4s ease-in-out infinite;
      }
      .hud--result .hud-dot {
        background: var(--hud-accent);
      }
      .hud--error .hud-dot {
        background: var(--hud-danger);
      }
      .hud--capturing .hud-dot {
        animation: hud-breath 2s ease-in-out infinite;
      }
      @keyframes hud-breath {
        50% {
          opacity: 0.35;
        }
      }
      .hud-status {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--hud-text-2);
        flex: 1;
      }
      .hud-meter {
        width: 72px;
        height: 4px;
        border-radius: 999px;
        background: var(--hud-line);
        overflow: hidden;
        flex: none;
      }
      .hud-meter-fill {
        height: 100%;
        width: 0%;
        background: var(--hud-accent);
        transition: width 120ms ease;
      }
      .hud-close {
        border: 0;
        background: none;
        color: var(--hud-text-3);
        font-size: 14px;
        cursor: pointer;
        padding: 2px 4px;
      }
      .hud-close:hover {
        color: var(--hud-text);
      }
      .hud-transcript {
        flex: 1;
        min-height: 20px;
        overflow-y: auto;
        font-size: 13px;
        line-height: 19px;
        color: var(--hud-text);
        overflow-wrap: anywhere;
      }
      .hud-transcript .hud-tail {
        color: var(--hud-text-3);
      }
      .hud-transcript .hud-hint {
        color: var(--hud-text-3);
        font-style: italic;
      }
      .hud-quote {
        display: block;
        color: var(--hud-text-3);
        font-size: 12px;
        line-height: 17px;
        font-style: italic;
        margin-bottom: 6px;
      }
      .hud-result-text {
        display: block;
        color: var(--hud-text);
        /* Multi-command results are one line per action */
        white-space: pre-line;
      }
      .hud--error .hud-result-text {
        color: var(--hud-danger);
      }
      .hud-footer {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        min-height: 24px;
      }
      .hud-button {
        border: 1px solid var(--hud-line);
        background: none;
        color: var(--hud-text);
        font-size: 12px;
        font-weight: 500;
        border-radius: 7px;
        padding: 4px 12px;
        cursor: pointer;
      }
      .hud-button:hover {
        border-color: var(--hud-accent);
        color: var(--hud-accent);
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="hud" id="hud">
      <div class="hud-header">
        <span class="hud-dot"></span>
        <span class="hud-status" id="status">Listening</span>
        <span class="hud-meter"><span class="hud-meter-fill" id="meter"></span></span>
        <button class="hud-close" id="close" title="Dismiss">✕</button>
      </div>
      <div class="hud-transcript" id="transcript"></div>
      <div class="hud-footer">
        <button class="hud-button hidden" id="stop">Stop</button>
        <button class="hud-button hidden" id="undo">Undo</button>
      </div>
    </div>
    <script type="module" src="/src/hud.ts"></script>
  </body>
</html>
